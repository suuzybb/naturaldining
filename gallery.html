  padding: 40px 20px;
  background: white;
}

h1 {
  letter-spacing: 2px;

section {
  padding: 40px 20px;

/* レッスンカード */
.lesson-box {
  background: white;
  padding: 20px;
  border-radius: 10px;

}

/* タイトル */
.lesson-title {

  font-size: 18px;
}

/* 画像グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.grid img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

/* ライトボックス */
.lightbox {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 60px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.lightbox img {
  display: block;
  margin: auto;
  max-width: 90%;
  max-height: 80%;
}

.lightbox:target {
  display: block;
}

/* 戻るボタン */
.back-btn {
  display: block;
  text-align: center;
  margin: 40px auto;
  padding: 15px;
  width: 220px;
  background: #b48a78;
  color: white;
  border-radius: 30px;
  text-decoration: none;
}
</style>
