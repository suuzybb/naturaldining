<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAST LESSON | NATURAL DINING</title>

<style>

body{
    margin:0;
    font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Noto Sans JP",sans-serif;
    background:#fafafa;
    color:#333;
    line-height:1.8;
}

header{
    background:#fff;
    text-align:center;
    padding:50px 20px;
}

header h1{
    letter-spacing:3px;
    color:#b48a78;
}

header p{
    color:#666;
}

section{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.lesson-box{
    background:#fff;
    padding:25px;
    border-radius:15px;
    margin-bottom:50px;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.lesson-title{
    font-size:24px;
    color:#b48a78;
    margin-bottom:20px;
    border-bottom:2px solid #eee;
    padding-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.grid img{
    width:100%;
    aspect-ratio:1;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.grid img:hover{
    transform:scale(1.04);
}

/* 拡大表示 */

#viewer{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

#viewer img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

#viewer.show{
    display:flex;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:#fff;
    font-size:40px;
    cursor:pointer;
}

.back-btn{
    display:block;
    width:240px;
    margin:60px auto;
    text-align:center;
    background:#b48a78;
    color:#fff;
    padding:16px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

.back-btn:hover{
    background:#9e7565;
}

/* スマホ */

@media(max-width:768px){

.lesson-title{
    font-size:20px;
}

.grid{
    grid-template-columns:repeat(2,1fr);
}

header h1{
    font-size:28px;
}

}

</style>

</head>

<script>

const viewer=document.getElementById("viewer");

const viewerImg=viewer.querySelector("img");

document.querySelectorAll(".grid img").forEach(img=>{

img.onclick=function(){

viewer.classList.add("show");

viewerImg.src=this.src;

}

});

viewer.onclick=function(){

viewer.classList.remove("show");

}

</script>
